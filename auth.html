    <style>
        /* ========== الأساسيات المستقبلية ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a1a;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(100, 50, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 200, 255, 0.06) 0%, transparent 60%),
                repeating-linear-gradient(45deg, rgba(100, 150, 255, 0.02) 0px, rgba(100, 150, 255, 0.02) 2px, transparent 2px, transparent 8px);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* تأثير المسح الضوئي */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(100, 150, 255, 0.02) 50%, 
                transparent 100%);
            pointer-events: none;
            z-index: 1;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* حركات */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(100, 50, 255, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 150, 255, 0.5); }
        }

        @keyframes neonFloat {
            0%, 100% { text-shadow: 0 0 20px #6432ff, 0 0 40px #0096ff; }
            50% { text-shadow: 0 0 30px #8b5cf6, 0 0 60px #38bdf8; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== المكونات الزجاجية ========== */
        .glass-panel {
            background: rgba(15, 25, 45, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(100, 150, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(100, 150, 255, 0.05) inset;
        }

        .glass-card {
            background: rgba(20, 30, 50, 0.5);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(100, 150, 255, 0.4);
            box-shadow: 0 10px 30px rgba(100, 50, 255, 0.2), 0 0 0 1px rgba(100, 150, 255, 0.2) inset;
            transform: translateY(-2px);
        }

        .glass-input {
            background: rgba(15, 25, 45, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 16px;
            color: #fff;
            padding: 14px 18px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-input:focus {
            border-color: #6432ff;
            box-shadow: 0 0 0 3px rgba(100, 50, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.2);
        }

        .glass-input::placeholder {
            color: rgba(160, 200, 255, 0.5);
        }
